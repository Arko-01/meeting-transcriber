<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2440"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f8cff"/>
      <stop offset="1" stop-color="#38d39f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- mic body -->
  <rect x="216" y="120" width="80" height="160" rx="40" fill="url(#accent)"/>
  <!-- mic stand arc -->
  <path d="M168 248a88 88 0 0 0 176 0" fill="none" stroke="url(#accent)" stroke-width="20" stroke-linecap="round"/>
  <line x1="256" y1="336" x2="256" y2="384" stroke="url(#accent)" stroke-width="20" stroke-linecap="round"/>
  <line x1="208" y1="384" x2="304" y2="384" stroke="url(#accent)" stroke-width="20" stroke-linecap="round"/>
  <!-- waveform -->
  <g stroke="#e7ecf5" stroke-width="16" stroke-linecap="round" opacity="0.9">
    <line x1="356" y1="190" x2="356" y2="250"/>
    <line x1="392" y1="166" x2="392" y2="274"/>
    <line x1="428" y1="200" x2="428" y2="240"/>
    <line x1="156" y1="190" x2="156" y2="250"/>
    <line x1="120" y1="166" x2="120" y2="274"/>
    <line x1="84" y1="200" x2="84" y2="240"/>
  </g>
</svg>
